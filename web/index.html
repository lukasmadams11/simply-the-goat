  <head>
    <meta charset="UTF-8" />

    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=2" />

    <meta name="theme-color" content="#FEFAE0" />
    <meta
      name="description"
      content="Simply the GOAT — professional wildfire mitigation through targeted, heartfelt goat grazing."
    />
    <title>Simply the GOAT</title>
    <script type="text/javascript">
      // Pair with public/404.html: restores the original route after
      // GitHub Pages bounces a deep link through 404.html.
      ;(function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&')
            })
            .join('?')
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash
          )
        }
      })(window.location)
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
